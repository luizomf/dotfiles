# Terminal & colors (works locally, in Docker, and over SSH)
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:Tc"
set -g allow-passthrough on
set -s escape-time 0

# Enable activity alerts
set -g monitor-activity on
set -g visual-bell off
set -g visual-activity off
set -g visual-silence off

# Increase history (buffer size)
set-option -g history-limit 30000
# Set vim keys for almost everything.
set-option -g mode-keys vi

set -g mouse off # I dont use mouse
set -g renumber-windows on # Reorder window numbers

# Start windows e panes from 1
set -g base-index 1
set -g pane-base-index 1

# Add title to the terminal
set -g set-titles on
# WIP Below (I am trying to find a good balance here)
# It shows and emoji in the title when prefix is pressed.
set -g set-titles-string '#{pane_current_command} · #S:#W · #H #{session_alerts} #{?client_prefix,✼,}'

setw -g allow-rename off
setw -g automatic-rename off

# Enable clipboard integration
set -g set-clipboard on
set -g allow-passthrough on
bind -T copy-mode-vi v send -X begin-selection

# macOS: pbcopy
if-shell 'uname -s | grep -q Darwin' {
  bind -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
  # bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
  # bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
}

# Linux / Docker / SSH: OSC 52
if-shell 'uname -s | grep -q Linux' {
  bind -T copy-mode-vi y     send -X copy-pipe-and-cancel \
    "tmux save-buffer - | base64 | tr -d '\n' | printf '\033]52;c;%s\007' \"$(cat)\""
  bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel \
    "tmux save-buffer - | base64 | tr -d '\n' | printf '\033]52;c;%s\007' \"$(cat)\""
}

# <prefix> r (reload) - Reloads .tmux.conf
bind r run-shell -b '\
  tmux source-file ~/.tmux.conf ; \
  tmux display-message "Config reloaded 🌀..."; \
'

# <prefix> Ctrl+l - list all windows using fzf
bind C-l run-shell '${HOME}/dotfiles/tmux/scripts/fzf.sh'

# Popup Keybinds
# <prefix> Ctrl+n (notes) - Opens nvim for notes
bind-key C-n display-popup -E -w 80% -h 80% "${HOME}/dotfiles/tmux/scripts/make_note.sh"
# <prefix> Ctrl+p (Python REPL) - Opens Python REPL (quit closes)
bind-key C-p display-popup -E -w 80% -h 80% "${HOME}/.pyenv/shims/python"
# <prefix> Ctrl+h (htop) - Opens htop (q closes)
bind-key C-h display-popup -E -w 80% -h 80% "htop"
# <prefix> Ctrl+t (terminal) - Opens a new terminal popup (exit closes)
bind-key C-t display-popup -E -w80% -h80% ""

# Toggle popup
# https://gist.github.com/LintaoAmons/22f6184b26bd5b93d8fe9f9276f50f75
# Credits goes to the gist above. But I changed it a lot.
# This opens a floating popup and keeps it opened. You can toggle with
# <prefix> Ctrl+w. You can switch sessions, windows and panes. It will
# keep everything intact. You can close it by exiting (exit).
bind-key -r C-w run-shell '${HOME}/dotfiles/tmux/scripts/popup.sh float term'

# THEME
set -g prompt-cursor-colour white
set -g status-left-style NONE
set -g status-right-style NONE

# Status left
set -g status-left-length 1
set -g status-left ''

# Status right
set -g status-right-length 30
set -g status-right "#{?client_prefix,#[fg=cyan bg=black] #S [#h] ,#[fg=white dim bg=black] #S [#h] }"

# Messages
set -g mode-style "fg=black,bg=blue"
set -g message-style "fg=cyan,bg=black,fill=black"
set -g message-command-style "fg=cyan,bg=black,fill=black"

# Enable status bar
set -g status "on"
set -g status-justify "left"

setw -g window-status-style "NONE,fg=black,bg=cyan"
setw -g window-status-format "#[fg=black,bg=cyan]  #W:#I#F  #[default]"
setw -g window-status-current-format "#[fg=white, bg=black] #W:#I#F #[default]"

# Reset some style if it is configured
setw -g window-status-separator ""
setw -g window-status-activity-style ""

set -g status-style "fg=black,bg=cyan"

# TPM (Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # Configurações sensatas padrão
set -g @plugin 'tmux-plugins/tmux-resurrect' # Salva e restaura sessões
set -g @plugin 'tmux-plugins/tmux-continuum' # Restauração automática

# Continuum config
set -g @continuum-restore 'on' # restore when I open tmux
# Save every 5 minutes
set -g @continuum-save-interval '60'

# Start TPM
run '${HOME}/.tmux/plugins/tpm/tpm'

